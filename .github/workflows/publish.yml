name: Publish NuGet Package

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Read package version
      id: version
      run: |
        VERSION=$(grep -oP '(?<=<PackageVersion>)[^<]+' src/PeachPDF/PeachPDF.csproj)
        echo "value=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Create and push tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "v${{ steps.version.outputs.value }}"
        git push origin "v${{ steps.version.outputs.value }}"

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "v${{ steps.version.outputs.value }}" \
          --title "v${{ steps.version.outputs.value }}" \
          --generate-notes

    - name: Build
      run: dotnet build src/PeachPDF/PeachPDF.csproj --configuration Release

    - name: Pack
      run: dotnet pack src/PeachPDF/PeachPDF.csproj --configuration Release --no-build --output ./packages

    - name: NuGet login
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push to NuGet.org
      run: |
        dotnet nuget push "./packages/*.nupkg" \
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
